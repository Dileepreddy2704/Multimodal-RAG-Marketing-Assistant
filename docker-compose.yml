version: "3.9"

services:

  backend:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: rag_backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

  frontend:

    build:
      context: .
      dockerfile: Dockerfile.streamlit

    container_name: rag_frontend

    ports:
      - "8501:8501"

    env_file:
      - .env

    volumes:
      - .:/app

    depends_on:
      - backend